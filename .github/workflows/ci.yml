# CI：lint + 类型检查 + 测试 + 构建
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      # config.py 要求 jwt_secret_key；CI 仅用占位符，勿用于生产
      JWT_SECRET_KEY: github-actions-ci-placeholder-not-for-production
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check app/

      - name: Ruff format check
        run: ruff format --check app/

      - name: Run tests
        run: pytest

      - name: Byte-compile backend
        run: python -m compileall -q app/backend

      - name: Smoke import app
        run: python -c "from app.backend.main import app; assert app.title"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
